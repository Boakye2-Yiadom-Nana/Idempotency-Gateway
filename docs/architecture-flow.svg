<svg width="1200" height="1160" viewBox="0 0 1200 1160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 600 15px Arial, sans-serif; fill: #334155; }
      .edge { stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .edge-label { font: 700 14px Arial, sans-serif; fill: #475569; }
      .client { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .decision { fill: #fef3c7; stroke: #d97706; stroke-width: 3; }
      .process { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; }
      .success { fill: #bbf7d0; stroke: #15803d; stroke-width: 3; }
      .error { fill: #fee2e2; stroke: #dc2626; stroke-width: 3; }
      .cache { fill: #ede9fe; stroke: #7c3aed; stroke-width: 3; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="1160" fill="#f8fafc"/>
  <text x="600" y="54" text-anchor="middle" class="title">FinSafe Idempotency Payment Flow</text>

  <rect x="390" y="90" width="420" height="70" rx="12" class="client"/>
  <text x="600" y="120" text-anchor="middle" class="label">Client sends payment request</text>
  <text x="600" y="145" text-anchor="middle" class="small">POST /process-payment</text>

  <path d="M600 160 L600 205" class="edge"/>
  <polygon points="600,205 790,270 600,335 410,270" class="decision"/>
  <text x="600" y="266" text-anchor="middle" class="label">Idempotency-Key</text>
  <text x="600" y="291" text-anchor="middle" class="label">present?</text>

  <path d="M410 270 L230 270 L230 350" class="edge"/>
  <text x="306" y="252" text-anchor="middle" class="edge-label">No</text>
  <rect x="80" y="350" width="300" height="70" rx="12" class="error"/>
  <text x="230" y="380" text-anchor="middle" class="label">Return 400</text>
  <text x="230" y="405" text-anchor="middle" class="small">Missing Idempotency-Key</text>

  <path d="M600 335 L600 390" class="edge"/>
  <text x="633" y="366" text-anchor="middle" class="edge-label">Yes</text>
  <rect x="420" y="390" width="360" height="70" rx="12" class="process"/>
  <text x="600" y="432" text-anchor="middle" class="label">Hash request body</text>

  <path d="M600 460 L600 505" class="edge"/>
  <polygon points="600,505 790,570 600,635 410,570" class="decision"/>
  <text x="600" y="566" text-anchor="middle" class="label">Key exists in</text>
  <text x="600" y="591" text-anchor="middle" class="label">idempotency store?</text>

  <path d="M410 570 L250 570 L250 660" class="edge"/>
  <text x="325" y="552" text-anchor="middle" class="edge-label">No</text>
  <rect x="70" y="660" width="360" height="70" rx="12" class="process"/>
  <text x="250" y="690" text-anchor="middle" class="label">Reserve key</text>
  <text x="250" y="715" text-anchor="middle" class="small">Status: PROCESSING</text>

  <path d="M250 730 L250 775" class="edge"/>
  <rect x="70" y="775" width="360" height="70" rx="12" class="process"/>
  <text x="250" y="805" text-anchor="middle" class="label">Process payment</text>
  <text x="250" y="830" text-anchor="middle" class="small">Simulated 2 second delay</text>

  <path d="M250 845 L250 890" class="edge"/>
  <rect x="70" y="890" width="360" height="70" rx="12" class="process"/>
  <text x="250" y="920" text-anchor="middle" class="label">Save response</text>
  <text x="250" y="945" text-anchor="middle" class="small">Status: COMPLETED</text>

  <path d="M250 960 L250 1005" class="edge"/>
  <rect x="70" y="1005" width="360" height="70" rx="12" class="success"/>
  <text x="250" y="1035" text-anchor="middle" class="label">Return 201 Created</text>
  <text x="250" y="1060" text-anchor="middle" class="small">Charged amount currency</text>

  <path d="M790 570 L950 570 L950 660" class="edge"/>
  <text x="875" y="552" text-anchor="middle" class="edge-label">Yes</text>
  <polygon points="950,660 1130,725 950,790 770,725" class="decision"/>
  <text x="950" y="721" text-anchor="middle" class="label">Body hash</text>
  <text x="950" y="746" text-anchor="middle" class="label">matches?</text>

  <path d="M770 725 L620 725 L620 805" class="edge"/>
  <text x="700" y="707" text-anchor="middle" class="edge-label">No</text>
  <rect x="470" y="805" width="300" height="70" rx="12" class="error"/>
  <text x="620" y="835" text-anchor="middle" class="label">Return 422</text>
  <text x="620" y="860" text-anchor="middle" class="small">Different request body</text>

  <path d="M950 790 L950 845" class="edge"/>
  <text x="983" y="820" text-anchor="middle" class="edge-label">Yes</text>
  <polygon points="950,845 1130,910 950,975 770,910" class="decision"/>
  <text x="950" y="906" text-anchor="middle" class="label">Stored status?</text>

  <path d="M770 910 L620 910 L620 1005" class="edge"/>
  <text x="690" y="892" text-anchor="middle" class="edge-label">COMPLETED</text>
  <rect x="460" y="1005" width="320" height="70" rx="12" class="cache"/>
  <text x="620" y="1035" text-anchor="middle" class="label">Return saved response</text>
  <text x="620" y="1060" text-anchor="middle" class="small">X-Cache-Hit: true</text>

  <path d="M1130 910 L1160 910 L1160 1005 L1060 1005" class="edge"/>
  <text x="1085" y="892" text-anchor="middle" class="edge-label">PROCESSING</text>
  <rect x="850" y="1005" width="320" height="70" rx="12" class="process"/>
  <text x="1010" y="1035" text-anchor="middle" class="label">Poll until completed</text>
  <text x="1010" y="1060" text-anchor="middle" class="small">or timeout after wait limit</text>

  <path d="M850 1040 L780 1040" class="edge"/>
  <path d="M1010 1075 L1010 1115 L620 1115 L620 1075" class="edge"/>
  <text x="820" y="1022" text-anchor="middle" class="edge-label">Completed</text>

  <rect x="850" y="1090" width="320" height="50" rx="12" class="error"/>
  <text x="1010" y="1122" text-anchor="middle" class="label">Return 408 Timeout</text>
</svg>
